<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Финансовый Калькулятор</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="app">

        <!-- Header -->
        <header class="header">
            <div class="header-icon">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"></polyline>
                    <polyline points="16 7 22 7 22 13"></polyline>
                </svg>
            </div>
            <h1 class="header-title">Финансы</h1>
            <div class="header-badge" id="period-label">Месяц</div>
        </header>

        <!-- Period Toggle -->
        <div class="period-strip">
            <button class="period-btn" data-period="day">День</button>
            <button class="period-btn active" data-period="month">Месяц</button>
            <button class="period-btn" data-period="week">Неделя</button>
        </div>

        <!-- Results Hero -->
        <div class="hero-card" id="hero-card">
            <div class="hero-label">Чистая прибыль</div>
            <div class="hero-value" id="profit-value">0 ₽</div>
            <div class="hero-period" id="hero-period-text">за месяц</div>
            <div class="warning-banner" id="warning" style="display:none;">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
                    <line x1="12" y1="9" x2="12" y2="13"></line>
                    <line x1="12" y1="17" x2="12.01" y2="17"></line>
                </svg>
                Расходы превышают доходы
            </div>
        </div>

        <!-- Stats Row -->
        <div class="stats-row">
            <div class="stat-card stat-income">
                <div class="stat-icon">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline>
                        <polyline points="17 6 23 6 23 12"></polyline>
                    </svg>
                </div>
                <div class="stat-data">
                    <div class="stat-label">Доход</div>
                    <div class="stat-value" id="income-value">0 ₽</div>
                </div>
            </div>
            <div class="stat-card stat-expense">
                <div class="stat-icon">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="23 18 13.5 8.5 8.5 13.5 1 6"></polyline>
                        <polyline points="17 18 23 18 23 12"></polyline>
                    </svg>
                </div>
                <div class="stat-data">
                    <div class="stat-label">Расход</div>
                    <div class="stat-value" id="expense-value">0 ₽</div>
                </div>
            </div>
        </div>

        <!-- Expense Ratio -->
        <div class="ratio-card">
            <div class="ratio-header">
                <span class="ratio-label">Доля расходов</span>
                <span class="ratio-value" id="expense-ratio-value">0%</span>
            </div>
            <div class="progress-track">
                <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
            </div>
            <div class="ratio-hints">
                <span>Норма</span>
                <span>Критично</span>
            </div>
        </div>

        <!-- Income Section -->
        <div class="section-card">
            <div class="section-header income-header">
                <div class="section-dot dot-income"></div>
                <h2 class="section-title">Доходы</h2>
                <div class="section-total" id="income-total">0 ₽</div>
            </div>
            <div class="fields">
                <div class="field">
                    <label class="field-label" for="salary">Зарплата</label>
                    <div class="field-input-wrap">
                        <input class="field-input" type="number" id="salary" min="0" placeholder="0">
                        <span class="field-currency">₽</span>
                    </div>
                </div>
                <div class="field">
                    <label class="field-label" for="freelance">Фриланс</label>
                    <div class="field-input-wrap">
                        <input class="field-input" type="number" id="freelance" min="0" placeholder="0">
                        <span class="field-currency">₽</span>
                    </div>
                </div>
                <div class="field">
                    <label class="field-label" for="passive_income">Пассивный доход</label>
                    <div class="field-input-wrap">
                        <input class="field-input" type="number" id="passive_income" min="0" placeholder="0">
                        <span class="field-currency">₽</span>
                    </div>
                </div>
                <div class="field no-divider">
                    <label class="field-label" for="other_income">Прочие доходы</label>
                    <div class="field-input-wrap">
                        <input class="field-input" type="number" id="other_income" min="0" placeholder="0">
                        <span class="field-currency">₽</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Expenses Section -->
        <div class="section-card">
            <div class="section-header expense-header">
                <div class="section-dot dot-expense"></div>
                <h2 class="section-title">Расходы</h2>
                <div class="section-total" id="expense-total">0 ₽</div>
            </div>
            <div class="fields">
                <div class="field">
                    <label class="field-label" for="rent">Аренда</label>
                    <div class="field-input-wrap">
                        <input class="field-input" type="number" id="rent" min="0" placeholder="0">
                        <span class="field-currency">₽</span>
                    </div>
                </div>
                <div class="field">
                    <label class="field-label" for="food">Еда</label>
                    <div class="field-input-wrap">
                        <input class="field-input" type="number" id="food" min="0" placeholder="0">
                        <span class="field-currency">₽</span>
                    </div>
                </div>
                <div class="field">
                    <label class="field-label" for="transport">Транспорт</label>
                    <div class="field-input-wrap">
                        <input class="field-input" type="number" id="transport" min="0" placeholder="0">
                        <span class="field-currency">₽</span>
                    </div>
                </div>
                <div class="field">
                    <label class="field-label" for="marketing">Маркетинг</label>
                    <div class="field-input-wrap">
                        <input class="field-input" type="number" id="marketing" min="0" placeholder="0">
                        <span class="field-currency">₽</span>
                    </div>
                </div>
                <div class="field no-divider">
                    <label class="field-label" for="other_expenses">Прочие расходы</label>
                    <div class="field-input-wrap">
                        <input class="field-input" type="number" id="other_expenses" min="0" placeholder="0">
                        <span class="field-currency">₽</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="bottom-spacer"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
